<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciador de Tarefas</title>
<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
</style>
</head>
<body>
<header>
    <h1>✅ Gerenciador de Tarefas</h1>
    <p>Organize e acompanhe suas atividades</p>
</header>
<main>

    <div class="panel">
        <h2 class="panel__title">➕ Nova Tarefa</h2>
        <form id="formTarefa">
            <div class="field">
                <label for="descricao">Descrição da Tarefa</label>
                <input type="text" id="descricao" placeholder="Digite uma tarefa...">
            </div>
            <button class="btn btn--primary" type="submit"> Adicionar Tarefa </button>
        </form>
    </div>

    <div class="panel">
        <div class="lista-header">
            <h2 class="panel__title"> 📋 Tarefas Registradas</h2>
            <span id="contador"> 0 tarefas</span>
        </div>
        <div id="empty-state"> Nenhuma tarefa cadastrada.<br>
            Adicione a primeira acima!
        </div>
        <ul id="listaTarefas"></ul>
    </div>

</main>
</body>
</html>
